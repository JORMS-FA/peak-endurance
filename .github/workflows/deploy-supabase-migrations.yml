name: Deploy Supabase Migrations

# Applies SQL migrations to the production database whenever a new migration
# lands on `main`. Without this, `supabase/migrations/**` changes only live in
# git and have to be pushed manually with `supabase db push`.
#
# Required GitHub secret:
#   SUPABASE_ACCESS_TOKEN  → personal access token from `supabase login`
#
# Optional GitHub secret (recommended for `db push`):
#   SUPABASE_DB_PASSWORD   → the database password for the linked project.
#                            Needed because `db push` connects to Postgres
#                            directly. Set it in the Supabase dashboard under
#                            Project Settings > Database.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-supabase-migrations.yml'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Never run two migration pushes at once.
concurrency:
  group: supabase-migrations-deploy
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: uoxumppvhismnttfllzj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        run: supabase db push
