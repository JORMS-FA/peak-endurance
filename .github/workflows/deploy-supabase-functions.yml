name: Deploy Supabase Edge Functions

# Deploys all Supabase Edge Functions whenever their source changes on `main`.
# Vercel only deploys the frontend, so without this the functions in production
# keep running the old code after every push.
#
# Required GitHub secret:
#   SUPABASE_ACCESS_TOKEN  → personal access token from `supabase login`
#                            (Account > Access Tokens in the Supabase dashboard)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

# Avoid overlapping deploys racing each other.
concurrency:
  group: supabase-functions-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: uoxumppvhismnttfllzj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
